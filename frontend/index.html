<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Holiday Planner</h1>

        <form id="trip-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="origin">From</label>
                    <input type="text" id="origin" placeholder="e.g. Warsaw" required>
                </div>
                <div class="form-group">
                    <label for="destination">To</label>
                    <input type="text" id="destination" placeholder="e.g. Dubrovnik" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="date-from">Departure</label>
                    <input type="date" id="date-from" required>
                </div>
                <div class="form-group">
                    <label for="date-to">Return</label>
                    <input type="date" id="date-to" required>
                </div>
                <div class="form-group">
                    <label for="budget">Budget (USD)</label>
                    <input type="number" id="budget" placeholder="2000" min="100" required>
                </div>
            </div>

            <button type="submit" id="submit-btn">Plan My Trip</button>
        </form>

        <div id="status" class="status hidden"></div>

        <div id="output" class="output hidden">
            <pre id="response-text"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
